name: lao_trust
description: LaoTrust (라오트러스트) - 신뢰를 기술로 증명하고, 라오스를 연결한다.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  shared_preferences: ^2.2.2
  # LT-08 미션02: Firebase (Firestore + Auth)
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.6
  connectivity_plus: ^6.0.5
  # LT-08 미션05: 실시간 푸시(긴급 출동) — FCM
  firebase_messaging: ^15.1.3
  # LT-10 확장: GPS 기반 거리 계산 (Geolocator)
  geolocator: ^13.0.1
  # LT-13 v4.4: 위저드 3단계 사진 업로드 (ImagePicker)
  image_picker: ^1.1.2
  # v10.8: Gemini REST (선택 — dart-define GEMINI_API_KEY)
  http: ^1.2.2
  # Noto Sans / Noto Sans Lao 전역 타이포 (작전 B)
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/i18n/
    - assets/translations/
